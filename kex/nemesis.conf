[[nemesis.schedule]]
at_tick = 500
action = { type = "partition", group_a = [0], group_b = [3, 4, 5] }

[[nemesis.schedule]]
at_tick = 800
action = { type = "heal_partition", group_a = [0], group_b = [3, 4, 5] }

[[nemesis.schedule]]
at_tick = 600
action = { type = "crash_node", node = 2 }

[[nemesis.schedule]]
at_tick = 900
action = { type = "restart_node", node = 2 }

[[nemesis.schedule]]
at_tick = 300
action = { type = "slow_link", from = 1, to = 0, extra_latency = 50 }